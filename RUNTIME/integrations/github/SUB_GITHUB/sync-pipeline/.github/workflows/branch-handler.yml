# Trigger C: New Branch Handler
# Runs when a new branch is created
# DOES NOT auto-merge - requires manual PR review and approval

name: Branch Creation Handler

on:
  create:
    branches:
      - '**'  # All branches except main

  pull_request:
    types: [opened, synchronize]
    branches:
      - main

jobs:
  notify-branch-creation:
    name: New Branch Notification
    runs-on: ubuntu-latest
    if: github.event_name == 'create'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Get branch info
        id: branch
        run: |
          branch_name="${{ github.ref_name }}"
          echo "name=$branch_name" >> $GITHUB_OUTPUT

          # Get commit count vs main
          commit_count=$(git rev-list --count main..$branch_name 2>/dev/null || echo 0)
          echo "commit_count=$commit_count" >> $GITHUB_OUTPUT

      - name: Analyze branch changes
        id: changes
        run: |
          # Get file changes compared to main
          git fetch origin main

          # Count changes
          modified=$(git diff --name-only --diff-filter=M origin/main...HEAD | wc -l)
          added=$(git diff --name-only --diff-filter=A origin/main...HEAD | wc -l)
          deleted=$(git diff --name-only --diff-filter=D origin/main...HEAD | wc -l)

          echo "modified=$modified" >> $GITHUB_OUTPUT
          echo "added=$added" >> $GITHUB_OUTPUT
          echo "deleted=$deleted" >> $GITHUB_OUTPUT

          # Get changed files list
          git diff --name-status origin/main...HEAD > changed_files.txt
          cat changed_files.txt

      - name: Create PR notification
        run: |
          echo "## 🚀 New Branch Created: ${{ steps.branch.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Changes vs main" >> $GITHUB_STEP_SUMMARY
          echo "- 🛠️ Modified: ${{ steps.changes.outputs.modified }} files" >> $GITHUB_STEP_SUMMARY
          echo "- ➕ Added: ${{ steps.changes.outputs.added }} files" >> $GITHUB_STEP_SUMMARY
          echo "- ✂️ Deleted: ${{ steps.changes.outputs.deleted }} files" >> $GITHUB_STEP_SUMMARY
          echo "- 🧾 Commits: ${{ steps.branch.outputs.commit_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Manual Review Required" >> $GITHUB_STEP_SUMMARY
          echo "This branch will **NOT** be auto-merged to main." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "To merge this branch:" >> $GITHUB_STEP_SUMMARY
          echo "1. Create a Pull Request" >> $GITHUB_STEP_SUMMARY
          echo "2. Request reviews from team members" >> $GITHUB_STEP_SUMMARY
          echo "3. Ensure all checks pass" >> $GITHUB_STEP_SUMMARY
          echo "4. Merge manually or via \`gh pr merge\`" >> $GITHUB_STEP_SUMMARY

      - name: Comment on associated PR (if exists)
        if: github.event.pull_request
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🔔 Sync System Notification

              This PR contains changes to be merged into \`main\`.

              **Changes:**
              - Modified: ${{ steps.changes.outputs.modified }} files
              - Added: ${{ steps.changes.outputs.added }} files
              - Deleted: ${{ steps.changes.outputs.deleted }} files

              **After merge:**
              - Remote sync will trigger automatically
              - Local repositories will pull changes within debounce window
              - No infinite loop will occur (commit marked with \`sync:\` prefix)

              ✅ **Manual review required before merge**`
            })

  pr-quality-checks:
    name: PR Quality Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate PR
        run: |
          echo "## 🔎 PR Quality Checks" >> $GITHUB_STEP_SUMMARY

          # Check for merge conflicts
          git fetch origin ${{ github.base_ref }}
          if git merge-tree $(git merge-base origin/${{ github.base_ref }} HEAD) origin/${{ github.base_ref }} HEAD | grep -q "^-"; then
            echo "❌ Merge conflicts detected" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "✅ No merge conflicts" >> $GITHUB_STEP_SUMMARY
          fi

          # Check if PR targets main
          if [ "${{ github.base_ref }}" = "main" ]; then
            echo "✅ PR targets main branch" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ PR does not target main" >> $GITHUB_STEP_SUMMARY
          fi

          # Check for sync-related files
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E "\\.sync-|sync\\."; then
            echo "⚠️ PR modifies sync infrastructure files" >> $GITHUB_STEP_SUMMARY
            echo "Extra caution recommended" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Analyze commit messages
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📝 Commit Messages" >> $GITHUB_STEP_SUMMARY

          # Get commits in PR
          commits=$(git log origin/${{ github.base_ref }}..HEAD --oneline)
          echo "$commits" | while read line; do
            echo "- $line" >> $GITHUB_STEP_SUMMARY
          done

          # Check for sync commits (should not be in PR)
          if echo "$commits" | grep -q "^sync:"; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Warning: PR contains sync-generated commits" >> $GITHUB_STEP_SUMMARY
            echo "This may indicate a branch that was synced to - review carefully" >> $GITHUB_STEP_SUMMARY
          fi

  prevent-auto-merge:
    name: Block Auto-Merge
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Prevent auto-merge
        uses: actions/github-script@v7
        with:
          script: |
            // Disable auto-merge if enabled
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });

            if (pr.auto_merge) {
              await github.rest.pulls.updateBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                auto_merge: null
              });

              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '🚫 Auto-merge disabled - manual review required per sync policy'
              });
            }

      - name: Add review requirement label
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-review', 'sync-aware']
            });

  post-merge-sync:
    name: Post-Merge Sync Notification
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true

    steps:
      - name: Notify merge success
        run: |
          echo "## 🎉 PR Merged Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Branch \`${{ github.head_ref }}\` has been merged into \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "1. 🔄 Remote sync workflow will trigger" >> $GITHUB_STEP_SUMMARY
          echo "2. 💻 Local repositories will pull changes" >> $GITHUB_STEP_SUMMARY
          echo "3. 🧩 Sync manifests will be updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor the **Remote Sync Handler** workflow for status" >> $GITHUB_STEP_SUMMARY

