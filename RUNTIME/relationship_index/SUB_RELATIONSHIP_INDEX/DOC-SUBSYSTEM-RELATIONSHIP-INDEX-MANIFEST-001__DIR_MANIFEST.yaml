# DOC_LINK: DOC-SUBSYSTEM-RELATIONSHIP-INDEX-MANIFEST-001
contracts:
  invariants:
    constraints:
    - No unseeded random operations
    - All file paths normalized (/ separator)
    - Confidence values must be 0.0 or 1.0 (binary model)
    post_conditions:
    - Output JSON validates against schemas/relationship_index.schema.json
    - All edge IDs are unique and stable
    - Nodes sorted by doc_id, edges sorted by rel_id
    pre_conditions:
    - Doc ID registry exists at ../SUB_DOC_ID/5_REGISTRY_DATA/docs_inventory.jsonl
    - All analyzers are initialized with confidence engine and registry
  provides:
  - artifact: RELATIONSHIP_INDEX.json
    description: Complete relationship graph with nodes and edges
    guarantees:
    - "Deterministic output (same inputs \xE2\u2020\u2019 same output)"
    - Schema-valid JSON (JSON Schema Draft 2020-12)
    - Stable edge IDs (SHA256-based)
    path: data/RELATIONSHIP_INDEX.json
    schema: schemas/relationship_index.schema.json
  requires:
  - artifact: Doc ID Registry
    constraints:
    - Must exist before running build
    - Must have 'status' field with value 'registered' for indexed files
    - Must have 'path', 'doc_id', 'file_type', 'last_modified' fields
    description: JSONL file with doc_id assignments
    path: ../SUB_DOC_ID/5_REGISTRY_DATA/docs_inventory.jsonl
  side_effects:
    filesystem:
      reads:
      - description: Doc ID registry input
        path: ../SUB_DOC_ID/5_REGISTRY_DATA/docs_inventory.jsonl
      writes:
      - description: Generated relationship index
        deterministic: true
        path: data/RELATIONSHIP_INDEX.json
    no_modifications:
    - Does NOT modify source files
    - Does NOT update doc_id registry
    - Read-only analysis system
dependencies:
  external:
  - name: Python 3.8+
    type: runtime
  - install: pip install pyyaml
    name: pyyaml
    type: library
  - install: pip install jsonschema
    name: jsonschema
    type: library
  optional:
  - description: 'Future integration: merge code + governance graphs'
    name: SSOT_System
    path: ../SSOT_System
  required:
  - contracts:
    - Requires docs_inventory.jsonl with status='registered'
    description: Provides doc_id registry (docs_inventory.jsonl)
    name: SUB_DOC_ID
    path: ../SUB_DOC_ID
directory:
  created: '2025-12-31'
  description: Autonomous relationship graph builder that discovers code-level dependencies
    across doc_id-tagged repository files
  maturity: production
  name: SUB_RELATIONSHIP_INDEX
  purpose: 'Build and maintain a relationship index showing how files depend on each
    other through:

    - Python imports (AST-based extraction)

    - JSON schema references ($ref fields)

    - PowerShell dot-sourcing (. "./script.ps1")


    Operates independently from SSOT governance graph, focusing on actual code relationships.

    '
  status: active
