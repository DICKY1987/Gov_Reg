meta:
  process_id: DIRECTORY_INTEGRATION_PROCESS_STEPS_SCHEMA
  source_file: PROCESS_STEP_LIB\PFA_DIRECTORY_INTEGRATION_PROCESS_STEPS_SCHEMA.yaml
  description: Process steps for directory integration E2E coverage - Phase 2, 6, 7, and 9 operations
  created_from_analysis: FOLDER_STEP_INTERSECTION_ANALYSIS.md and NON_INTERSECTING_DIRECTORIES_ANALYSIS.md
steps:
# Phase 2 - Design/Request Building Steps
- step_id: DIR-INT-PHASE2-001
  phase: DESIGN
  name: Validate I/O Contract Pipeline
  description: |
    Validate input/output contracts for all system boundaries using SUB_IO_CONTRACT_PIPELINE tools.
    Ensures all phase interfaces have defined contracts with proper pre/post-conditions.
  responsible_component: io_contract_validator
  operation_kind: validation
  inputs:
    - 'contracts_dir: WORKFLOWS/planning/PHASE_2_REQUEST_BUILDING/contracts/SUB_IO_CONTRACT_PIPELINE/'
    - 'phase_interfaces: List of phase boundary definitions'
  expected_outputs:
    - I/O contract validation report
    - Contract compliance status for each interface
  requires_human_confirmation: false
  pattern_ids: []
  artifact_registry_refs:
    - WORKFLOWS/planning/PHASE_2_REQUEST_BUILDING/contracts/
  guardrail_checkpoint: true
  guardrail_checkpoint_id: GC-IO-CONTRACT-VALIDATION

- step_id: DIR-INT-PHASE2-002
  phase: DESIGN
  name: Validate System Determinism Contract
  description: |
    Validate SYSTEM_DETERMINISM_CONTRACT.json to ensure all code follows determinism requirements:
    - Explicit seed parameters (no unseeded random())
    - Clock injection for timestamps (no datetime.now())
    - Hermetic execution (all outputs to designated run directory)
    - Stable IDs (no UUID generation)
  responsible_component: determinism_validator
  operation_kind: validation
  inputs:
    - 'determinism_contract: WORKFLOWS/planning/PHASE_2_REQUEST_BUILDING/SYSTEM_DETERMINISM_CONTRACT.json'
    - 'codebase_scan: Python/JS code files to validate'
  expected_outputs:
    - Determinism compliance report
    - List of violations with file/line references
  requires_human_confirmation: false
  pattern_ids: []
  artifact_registry_refs:
    - WORKFLOWS/planning/PHASE_2_REQUEST_BUILDING/SYSTEM_DETERMINISM_CONTRACT.json
  guardrail_checkpoint: true
  guardrail_checkpoint_id: GC-DETERMINISM-VALIDATION

# Phase 6 - Error Recovery Steps
- step_id: DIR-INT-PHASE6-001
  phase: RECOVERY
  name: Execute Migration Validation
  description: |
    Validate migration artifacts and state using migration tools from PHASE_6_ERROR_RECOVERY/migration/.
    Checks migration integrity, rollback readiness, and artifact version consistency.
  responsible_component: migration_validator
  operation_kind: validation
  inputs:
    - 'migration_config: generated/PHASE_6_ERROR_RECOVERY/migration/config.yaml'
    - 'migration_log: generated/PHASE_6_ERROR_RECOVERY/migration/migration_log.txt'
  expected_outputs:
    - Migration validation report
    - Rollback readiness status
  requires_human_confirmation: false
  pattern_ids: []
  artifact_registry_refs:
    - generated/PHASE_6_ERROR_RECOVERY/migration/
  guardrail_checkpoint: false

- step_id: DIR-INT-PHASE6-002
  phase: RECOVERY
  name: Rollback Artifacts on Failure
  description: |
    Execute rollback procedures using migration/rollback/ tools when execution failures occur.
    Restores system to last known good state using migration tracking data.
  responsible_component: rollback_orchestrator
  operation_kind: execution
  inputs:
    - 'failure_context: Error details and failed step ID'
    - 'rollback_scripts: generated/PHASE_6_ERROR_RECOVERY/migration/rollback/'
  expected_outputs:
    - Rollback execution report
    - System state restoration confirmation
  requires_human_confirmation: true
  pattern_ids: []
  artifact_registry_refs:
    - generated/PHASE_6_ERROR_RECOVERY/migration/rollback/
  guardrail_checkpoint: false

# Phase 7 - Monitoring Steps
- step_id: DIR-INT-PHASE7-001
  phase: MONITORING
  name: Aggregate Execution Logs
  description: |
    Collect and aggregate execution logs from all phases using SUB_LOG_REVIEW tools.
    Consolidates logs from multiple sources into unified log store for analysis.
  responsible_component: log_aggregator
  operation_kind: aggregation
  inputs:
    - 'log_sources: RUNTIME/runs/{run_id}/logs/'
    - 'aggregation_script: generated/PHASE_7_MONITORING/logs/log_review/aggregate-logs.ps1'
  expected_outputs:
    - Aggregated log database
    - Log aggregation summary report
  requires_human_confirmation: false
  pattern_ids: []
  artifact_registry_refs:
    - generated/PHASE_7_MONITORING/logs/log_review/
  guardrail_checkpoint: false

- step_id: DIR-INT-PHASE7-002
  phase: MONITORING
  name: Analyze Log Patterns for Issues
  description: |
    Mine execution logs for error patterns, anomalies, and performance issues using multi_ai_log_miner.py.
    Extracts insights from structured logs to identify systemic issues.
  responsible_component: log_analyzer
  operation_kind: analysis
  inputs:
    - 'aggregated_logs: SQLite database from log aggregation'
    - 'analysis_script: generated/PHASE_7_MONITORING/logs/log_review/SUB_LOG_REVIEW/multi_ai_log_miner.py'
  expected_outputs:
    - Log pattern analysis report
    - Identified error patterns and anomalies
    - Performance bottleneck recommendations
  requires_human_confirmation: false
  pattern_ids: []
  artifact_registry_refs:
    - generated/PHASE_7_MONITORING/logs/log_review/SUB_LOG_REVIEW/
  guardrail_checkpoint: false

- step_id: DIR-INT-PHASE7-003
  phase: MONITORING
  name: Export Logs to Data Store
  description: |
    Export analyzed logs to persistent data store (SQLite/JSON) using export-logs.ps1.
    Ensures log history is preserved for trend analysis and auditing.
  responsible_component: log_exporter
  operation_kind: persistence
  inputs:
    - 'analyzed_logs: Analysis results from log pattern mining'
    - 'export_script: generated/PHASE_7_MONITORING/logs/log_review/export-logs.ps1'
  expected_outputs:
    - Exported log database
    - Export completion confirmation
  requires_human_confirmation: false
  pattern_ids: []
  artifact_registry_refs:
    - generated/PHASE_7_MONITORING/logs/log_review/
  guardrail_checkpoint: false

