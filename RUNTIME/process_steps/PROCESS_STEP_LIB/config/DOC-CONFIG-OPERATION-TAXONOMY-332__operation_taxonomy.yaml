# Ambiguous operations that need context for categorization
ambiguous_operations:
  update:
    default_category: "maintenance"
    context_rules:
      - condition: "phase in ['INIT', '1_BOOTSTRAP']"
        category: "initialization"
      - condition: "phase in ['EXECUTION', '6_EXECUTION']"
        category: "execution"
      - condition: "phase in ['MAINTENANCE', '8_MAINTENANCE']"
        category: "maintenance"

  validate:
    default_category: "validation"
    context_rules:
      - condition: "responsible_component contains 'schema'"
        category: "validation"
      - condition: "responsible_component contains 'quality'"
        category: "validation"

  generate:
    default_category: "generation"
    context_rules:
      - condition: "expected_outputs contains 'report'"
        category: "reporting"
      - condition: "expected_outputs contains 'summary'"
        category: "reporting"

# Operation kind patterns (regex-based categorization)
operation_patterns:
  - pattern: "^(init|setup|bootstrap|load_config)"
    category: "initialization"

  - pattern: "^(scan|discover|find|search|mine|extract)"
    category: "discovery"

  - pattern: "^(analyze|compute|calculate|evaluate|detect)"
    category: "analysis"

  - pattern: "^(validate|verify|check|comply)"
    category: "validation"

  - pattern: "^(parse|convert|transform|normalize|render)"
    category: "transformation"

  - pattern: "^(generate|create|build|synthesize|produce)"
    category: "generation"

  - pattern: "^(register|index|catalog|enroll|list)"
    category: "registration"

  - pattern: "^(execute|run|invoke|process|perform)"
    category: "execution"

  - pattern: "^(monitor|track|observe|measure|watch)"
    category: "monitoring"

  - pattern: "^(aggregate|consolidate|merge|collect|combine)"
    category: "aggregation"

  - pattern: "^(save|store|persist|write|commit)"
    category: "persistence"

  - pattern: "^(sync|synchronize|reconcile|integrate)"
    category: "synchronization"

  - pattern: "^(approve|authorize|confirm|review|gate)"
    category: "approval"

  - pattern: "^(maintain|patch|update|deprecate|archive|cleanup)"
    category: "maintenance"

  - pattern: "^(report|summarize|notify|dashboard|log)"
    category: "reporting"

