# operation_taxonomy.yaml
# Consolidates 30+ operation_kind values into 15 unified categories
# Version: 1.0.0

version: "1.0.0"
description: "Operation kind taxonomy for E2E unified process schema"

# Universal operation categories (15 total)
universal_categories:
  initialization:
    description: "System startup, configuration loading, directory creation"
    examples:
      - "Loading configuration files"
      - "Creating directory structures"
      - "Initializing databases"
      - "Setting up runtime environment"

  discovery:
    description: "Scanning, searching, and identifying resources"
    examples:
      - "Scanning directories for files"
      - "Discovering patterns in code"
      - "Finding gaps in documentation"
      - "Extracting terms from content"

  analysis:
    description: "Analyzing, computing, and evaluating data"
    examples:
      - "Gap analysis"
      - "Similarity detection"
      - "Quality metrics computation"
      - "Dependency analysis"

  validation:
    description: "Checking compliance, quality, and correctness"
    examples:
      - "Schema validation"
      - "Quality checks"
      - "Constraint verification"
      - "Duplicate detection"

  transformation:
    description: "Converting, parsing, and transforming data"
    examples:
      - "YAML parsing"
      - "Format conversion"
      - "Data normalization"
      - "Template rendering"

  generation:
    description: "Creating new artifacts, documents, or code"
    examples:
      - "Generating specifications"
      - "Creating executors"
      - "Building documentation"
      - "Synthesizing reports"

  registration:
    description: "Registering, indexing, and cataloging entities"
    examples:
      - "Adding to registry"
      - "Creating index entries"
      - "Assigning identifiers"
      - "Cataloging artifacts"

  execution:
    description: "Running tasks, executing code, or invoking processes"
    examples:
      - "Executing tasks"
      - "Running agents"
      - "Invoking executors"
      - "Processing workflows"

  monitoring:
    description: "Observing, tracking, and measuring system behavior"
    examples:
      - "Performance monitoring"
      - "Health checks"
      - "Progress tracking"
      - "Telemetry collection"

  aggregation:
    description: "Collecting, consolidating, and merging results"
    examples:
      - "Aggregating results"
      - "Merging reports"
      - "Consolidating metrics"
      - "Combining outputs"

  persistence:
    description: "Saving, storing, and persisting data"
    examples:
      - "Writing to database"
      - "Saving files"
      - "Persisting state"
      - "Creating checkpoints"

  synchronization:
    description: "Syncing with external systems and maintaining consistency"
    examples:
      - "GitHub sync"
      - "External API calls"
      - "State reconciliation"
      - "Data synchronization"

  approval:
    description: "Approval gates, confirmation, and authorization"
    examples:
      - "Human approval"
      - "Automated approval"
      - "Confidence scoring"
      - "Authorization checks"

  maintenance:
    description: "Updates, patches, deprecation, and archival"
    examples:
      - "Applying patches"
      - "Deprecating entries"
      - "Archiving data"
      - "Cleanup operations"

  reporting:
    description: "Generating reports, summaries, and notifications"
    examples:
      - "Creating summary reports"
      - "Generating dashboards"
      - "Sending notifications"
      - "Producing analytics"

