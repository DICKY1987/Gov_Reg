name: Phase Advancement Evaluator

# This workflow evaluates whether a phase should advance based on
# completion criteria defined in the plan.  It runs on a schedule
# and can also be triggered manually.  The evaluation uses
# information from the plan, the execution state in GitHub and
# other evidence to decide if the next phase should be opened.

on:
  schedule:
    # Every 30 minutes evaluate phase advancement
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate installation token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}

      - name: Run phase advancement evaluator
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
