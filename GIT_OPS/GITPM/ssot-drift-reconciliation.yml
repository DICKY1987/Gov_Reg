name: SSOT Drift Reconciliation

# This workflow runs on a schedule and on push events to detect and
# correct drift between the canonical plan and the current state of
# GitHub.  It performs an observe → diff → act → report cycle as
# recommended by your system design.  When drift is detected it
# corrects automation‑owned fields and reports anything that
# requires manual attention.  Orphaned or missing items are
# detected but not automatically removed unless safe to do so.

on:
  schedule:
    # Every 15 minutes
    - cron: '*/15 * * * *'
  push:
    branches: [main]

jobs:
  reconcile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate installation token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}

