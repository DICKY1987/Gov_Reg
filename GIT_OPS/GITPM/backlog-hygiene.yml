name: Backlog Hygiene and Iteration Maintenance

# This workflow performs routine hygiene on your backlog.  It runs
# daily to detect stuck items, enforce required fields, roll up
# metrics and prepare the board for the next iteration.  The
# workflow is intentionally general; you should implement the
# details to fit your project's policies.

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate installation token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PEM }}

      - name: Run backlog hygiene tasks
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
