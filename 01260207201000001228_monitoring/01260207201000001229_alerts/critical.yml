# Critical Alert Rules for Gov_Reg

groups:
  - name: critical_alerts
    interval: 30s
    rules:
      - alert: RegistryValidationFailure
        expr: registry_validation_errors_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Registry validation failure detected"
          
      - alert: DataCorruptionDetected
        expr: data_integrity_check_failed > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Data corruption detected"
          
      - alert: HighErrorRate
        expr: rate(govreg_errors_total[5m]) > 0.05
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "Error rate above 5%"
          
      - alert: APILatencyHigh
        expr: api_response_time_seconds > 1
        for: 5m
        labels:
          severity: high
        annotations:
          summary: "API latency > 1s"
