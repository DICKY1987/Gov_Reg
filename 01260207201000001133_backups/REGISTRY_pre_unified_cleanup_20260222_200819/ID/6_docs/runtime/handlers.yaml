category: "handlers"
purpose: "File and directory ID handling operations"
location: "1_runtime/handlers/"
last_updated: "2026-02-22"

modules:
  - name: "dir_id_handler"
    file: "P_01999000042260125068_dir_id_handler.py"
    status: "ACTIVE"
    purpose: "Read, write, and validate .dir_id anchor files"
    priority: "CRITICAL"
    
    functions:
      - name: "read_dir_id"
        signature: "read_dir_id(dir_path: str) -> dict"
        description: "Read and parse .dir_id file from directory"
        
        parameters:
          - name: "dir_path"
            type: "str"
            description: "Absolute or relative path to directory"
        
        returns:
          type: "dict"
          description: "Parsed .dir_id JSON content"
          schema_ref: "../schemas/.dir_id.schema.json"
          keys:
            - "dir_id (str)"
            - "allocated_at_utc (str)"
            - "allocator_version (str)"
            - "project_root_id (str)"
            - "relative_path (str)"
            - "depth (int, optional)"
            - "zone (str, optional)"
            - "parent_dir_id (str, optional)"
        
        raises:
          - exception: "FileNotFoundError"
            when: ".dir_id file does not exist"
          - exception: "JSONDecodeError"
            when: ".dir_id file is malformed"
          - exception: "ValidationError"
            when: ".dir_id content fails schema validation"
        
        example: |
          from ID.1_runtime.handlers.P_01999000042260125068_dir_id_handler import read_dir_id
          
          data = read_dir_id('C:/Users/richg/Gov_Reg/ID')
          # Returns: {
          #   "dir_id": "01999000042260124068",
          #   "allocated_at_utc": "2026-02-13T14:48:27Z",
          #   "allocator_version": "1.0.0",
          #   "project_root_id": "01999000042260124068",
          #   "relative_path": "ID",
          #   "depth": 1,
          #   "zone": "governed"
          # }
      
      - name: "write_dir_id"
        signature: "write_dir_id(dir_path: str, dir_id: str, metadata: dict) -> bool"
        description: "Write .dir_id anchor file to directory"
        
        parameters:
          - name: "dir_path"
            type: "str"
            description: "Directory to write .dir_id file"
          - name: "dir_id"
            type: "str"
            format: "\\d{20}"
            description: "20-digit directory ID"
          - name: "metadata"
            type: "dict"
            required_keys:
              - "allocated_at_utc"
              - "allocator_version"
              - "project_root_id"
              - "relative_path"
        
        returns:
          type: "bool"
          description: "True if write successful"
        
        side_effects:
          - "Creates .dir_id file in directory"
          - "Overwrites existing .dir_id if present"
          - "Sets file permissions to read-only (optional)"
        
        raises:
          - exception: "PermissionError"
            when: "Cannot write to directory"
          - exception: "ValidationError"
            when: "metadata fails schema validation"
        
        example: |
          metadata = {
              "allocated_at_utc": "2026-02-22T10:00:00Z",
              "allocator_version": "1.0.0",
              "project_root_id": "01999000042260124068",
              "relative_path": "ID/new_folder",
              "depth": 2,
              "zone": "governed"
          }
          success = write_dir_id('/path/to/dir', '01999000042260124550', metadata)
      
      - name: "validate_dir_id"
        signature: "validate_dir_id(dir_path: str) -> tuple[bool, list[str]]"
        description: "Validate .dir_id file against schema"
        
        parameters:
          - name: "dir_path"
            type: "str"
        
        returns:
          type: "tuple[bool, list[str]]"
          description: "(is_valid, error_messages)"
        
        example: |
          is_valid, errors = validate_dir_id('/path/to/dir')
          if not is_valid:
              print(f"Validation errors: {errors}")
      
      - name: "update_dir_id"
        signature: "update_dir_id(dir_path: str, updates: dict) -> bool"
        description: "Update specific fields in existing .dir_id"
        
        parameters:
          - name: "dir_path"
            type: "str"
          - name: "updates"
            type: "dict"
            description: "Fields to update (cannot change dir_id itself)"
        
        returns:
          type: "bool"
        
        constraints:
          - "Cannot change dir_id field (immutable)"
          - "Cannot change allocated_at_utc (immutable)"
          - "Can update: zone, parent_dir_id, metadata"
    
    dependencies:
      imports:
        - module: "json"
          usage: "JSON parsing and serialization"
        - module: "jsonschema"
          usage: "Schema validation"
        - module: "pathlib"
          usage: "Path operations"
      
      files:
        reads:
          - path: "{dir_path}/.dir_id"
            format: "JSON"
        writes:
          - path: "{dir_path}/.dir_id"
            format: "JSON"
      
      schemas:
        - path: "3_schemas/.dir_id.schema.json"
          usage: "Validation"
    
    error_handling:
      missing_file:
        symptom: "FileNotFoundError when reading"
        resolution: "Generate .dir_id using allocator"
        tool: "2_cli_tools/dir_id/P_01999000042260125100_generate_dir_ids_gov_reg.py"
      
      malformed_json:
        symptom: "JSONDecodeError"
        resolution: "Auto-repair with P_01999000042260125104_dir_id_auto_repair.py"
        reference: "operations/troubleshooting.yaml#malformed_dir_id"
      
      validation_failure:
        symptom: "Schema validation fails"
        resolution: "Check required fields, repair or regenerate"

  - name: "dir_identity_resolver"
    file: "P_01260207233100000070_dir_identity_resolver.py"
    status: "ACTIVE"
    purpose: "Resolve directory identity using multiple strategies"
    priority: "HIGH"
    
    functions:
      - name: "resolve_directory"
        signature: "resolve_directory(dir_path: str) -> dict"
        description: "Resolve directory identity with fallback strategies"
        
        parameters:
          - name: "dir_path"
            type: "str"
            description: "Directory to resolve"
        
        returns:
          type: "dict"
          description: "Directory identity information"
          fields:
            - "dir_id (str): 20-digit ID"
            - "source (str): Resolution method used"
            - "confidence (str): high|medium|low"
            - "metadata (dict): Additional context"
        
        resolution_strategies:
          - strategy: "dir_id_file"
            priority: 1
            description: "Read from .dir_id anchor file"
            confidence: "high"
          
          - strategy: "dirname_prefix"
            priority: 2
            description: "Extract from directory name prefix"
            confidence: "medium"
            pattern: "^\\d{20}_.*"
          
          - strategy: "registry_lookup"
            priority: 3
            description: "Query registry by path"
            confidence: "medium"
          
          - strategy: "parent_inference"
            priority: 4
            description: "Infer from parent directory"
            confidence: "low"
        
        example: |
          identity = resolve_directory('C:/Users/richg/Gov_Reg/ID')
          # Returns: {
          #   "dir_id": "01999000042260124068",
          #   "source": "dir_id_file",
          #   "confidence": "high",
          #   "metadata": {...}
          # }
      
      - name: "resolve_batch"
        signature: "resolve_batch(dir_paths: list[str]) -> dict[str, dict]"
        description: "Resolve multiple directories efficiently"
        
        parameters:
          - name: "dir_paths"
            type: "list[str]"
        
        returns:
          type: "dict[str, dict]"
          description: "Mapping of path to identity"
        
        performance:
          note: "Batches registry queries for efficiency"
    
    dependencies:
      imports:
        - module: "dir_id_handler"
          file: "P_01999000042260125068_dir_id_handler.py"
          usage: "Read .dir_id files"
        - module: "zone_classifier"
          file: "P_01999000042260125067_zone_classifier.py"
          usage: "Determine governance zone"
      
      external:
        - service: "Registry"
          path: "../../01260207201000001250_REGISTRY/"
          usage: "Lookup directory by path"
    
    state_machine:
      states:
        - name: "unresolved"
          transitions: ["resolving"]
        - name: "resolving"
          transitions: ["resolved", "failed"]
        - name: "resolved"
          terminal: true
        - name: "failed"
          transitions: ["resolving"]

dependency_graph:
  dir_id_handler:
    imports: ["json", "jsonschema", "pathlib"]
    imported_by: ["dir_identity_resolver", "CLI tools", "watchers"]
    calls: ["read_json", "write_json", "validate_schema"]
    called_by: ["resolve_directory", "generate_dir_ids", "validate_dir_ids"]
  
  dir_identity_resolver:
    imports: ["dir_id_handler", "zone_classifier"]
    imported_by: ["CLI tools", "Registry sync"]
    calls: ["read_dir_id", "classify_directory", "query_registry"]

common_workflows:
  read_directory_id:
    steps:
      - "Import read_dir_id"
      - "Call read_dir_id(path)"
      - "Receive dict with dir_id and metadata"
      - "Use dir_id for operations"
  
  create_directory_with_id:
    steps:
      - "Create directory on filesystem"
      - "Allocate dir_id from allocator"
      - "Prepare metadata (relative_path, zone, etc.)"
      - "Call write_dir_id(path, dir_id, metadata)"
      - "Verify with validate_dir_id(path)"
  
  resolve_unknown_directory:
    steps:
      - "Import resolve_directory"
      - "Call resolve_directory(path)"
      - "Check confidence level"
      - "If low confidence, regenerate .dir_id"

integration_points:
  with_allocators:
    - "dir_id_handler.write_dir_id() uses allocator.allocate_id()"
    - "Coordinates through unified workflow"
  
  with_validators:
    - "dir_id_handler.validate_dir_id() uses schema validation"
    - "Called by pre-commit hooks"
  
  with_watchers:
    - "Watchers use dir_id_handler for repair operations"
    - "Auto-repair calls read/write/validate functions"
  
  with_registry:
    - "dir_identity_resolver queries registry for fallback"
    - "Registry sync uses dir_id_handler to read identities"

performance:
  read_dir_id:
    typical_time: "1-5ms"
    cache_eligible: true
  
  write_dir_id:
    typical_time: "5-15ms"
    note: "Includes schema validation"
  
  resolve_directory:
    typical_time: "10-50ms"
    note: "Depends on strategy used"

troubleshooting:
  cannot_read_dir_id:
    symptoms:
      - "FileNotFoundError"
      - "Directory has no .dir_id"
    diagnosis:
      - "Check directory exists"
      - "Check .dir_id file exists"
      - "Check read permissions"
    resolution:
      - "Generate .dir_id: python 2_cli_tools/dir_id/P_01999000042260125100_*.py"
      - "Or resolve with fallback: use dir_identity_resolver"
  
  malformed_dir_id:
    symptoms:
      - "JSONDecodeError"
      - "ValidationError"
    diagnosis:
      - "Open .dir_id file, check JSON syntax"
      - "Validate against schema"
    resolution:
      - "Auto-repair: python 1_runtime/watchers/P_01999000042260125104_*.py"
      - "Or regenerate: delete .dir_id, run generator"
    reference: "operations/troubleshooting.yaml#malformed_dir_id"
