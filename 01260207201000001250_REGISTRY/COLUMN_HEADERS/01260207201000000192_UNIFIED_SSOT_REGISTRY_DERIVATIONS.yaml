dsl:
  allowed_functions:
  - BASENAME
  - DIRNAME
  - EXTENSION
  - NORMALIZE_PATH
  - JOIN_PATH
  - RELATIVE_TO
  - UPPER
  - LOWER
  - TRIM
  - CONCAT
  - SUBSTRING
  - REPLACE
  - SPLIT
  - MATCH
  - EXTRACT
  - EXTRACT_20_DIGIT_PREFIX
  - GENERATE_ID
  - ALLOCATE_FILE_ID
  - ALLOCATE_DIR_ID
  - WALK_UP_FIND_DIR_ID
  - MATCHES_ANY
  - NOW_UTC
  - ADD_SECONDS
  - FORMAT_ISO8601
  - PARSE_TIMESTAMP
  - SHA256_BYTES
  - SHA256_STRING
  - HASH_STABLE
  - READ_BYTES
  - FILE_SIZE
  - FILE_MTIME
  - FILE_EXISTS
  - IS_DIRECTORY
  - LOOKUP_CONFIG
  - LOOKUP_REGISTRY
  - LOOKUP_COLUMN
  - FIND_BY_PATH
  - FIND_BY_ID
  - MATCH_REPO_ROOT
  - INFER_ARTIFACT_KIND
  - INFER_LAYER
  - INFER_GOVERNANCE_DOMAIN
  - INFER_MODULE
  - IF
  - AND
  - OR
  - NOT
  - COALESCE
  - IS_NULL
  - EQUALS
  - CONTAINS
  - STARTS_WITH
  - ENDS_WITH
  - FIRST
  - LAST
  - COUNT
  - FILTER
  - MAP
  - UNIQUE
  - SORT
  - FLATTEN
  forbidden_patterns:
  - eval
  - exec
  - import
  - __
  - lambda
  - subprocess
  - os.system
  - open(
  description: Deterministic, sandboxed expression language for field derivation
  version: 1.0.0
derived_columns:
  dir_id:
    depends_on: []
    error_policy: fail
    type: string
    trigger: on_create_only
    null_behavior: allow
    formula: IF(is_directory, ALLOCATE_DIR_ID(), NULL)
    rationale: 20-digit unique directory identifier from allocator, null for files
    evidence:
    - allocator_state_before
    - allocator_state_after
    - allocated_dir_id
  depth:
    depends_on:
    - relative_path
    error_policy: fail
    type: integer
    trigger: recompute_on_scan
    null_behavior: fail
    formula: COUNT(SPLIT(relative_path, '/')) - 1
    rationale: Directory depth in tree (0=root, 1=immediate child, etc.)
  zone:
    depends_on:
    - depth
    - relative_path
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: |
      IF(
        MATCHES_ANY(relative_path, ['.git/**', '.venv/**', '**/__pycache__/**', '**/node_modules/**']),
        'excluded',
        IF(depth == 0, 'staging', 'governed')
      )
    rationale: Zone classification for governance rules (staging/governed/excluded)
  parent_dir_id:
    depends_on:
    - relative_path
    - depth
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(depth > 0, WALK_UP_FIND_DIR_ID(relative_path), NULL)
    rationale: Parent directory's dir_id by walking up tree to find .dir_id file
    evidence:
    - walked_path
    - found_dir_id_file
    - parent_dir_id
  owning_dir_id:
    depends_on:
    - relative_path
    - is_directory
    - zone
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(NOT(is_directory), WALK_UP_FIND_DIR_ID(relative_path), dir_id)
    rationale: Directory that owns this file (self if directory, parent if file)
  enforced_by:
    depends_on:
    - file_id
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_REGISTRY('enforcer_of', file_id)
    rationale: Primary enforcement mechanism
  geu_role:
    depends_on:
    - artifact_kind
    - relative_path
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('geu_roles', artifact_kind, relative_path)
    rationale: GEU role assignment
  repo_root_id:
    depends_on:
    - absolute_path
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: MATCH_REPO_ROOT(absolute_path)
    rationale: Matched from repo roots config
    evidence:
    - matched_root_path
    - repo_root_id
  observed_utc:
    depends_on: []
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: COALESCE(INPUT.event_timestamp, NOW_UTC())
    rationale: Event observation time
  has_tests:
    depends_on:
    - test_file_ids
    error_policy: set_false
    type: boolean
    trigger: recompute_on_scan
    null_behavior: set_false
    formula: COUNT(test_file_ids) > 0
    rationale: True if has associated test files
  content_type:
    depends_on:
    - extension
    - filename
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('mime_types', COALESCE(extension, filename))
    rationale: MIME type from extension mapping
  file_id:
    depends_on: []
    error_policy: fail
    type: string
    trigger: on_create_only
    null_behavior: fail
    formula: ALLOCATE_FILE_ID()
    rationale: 20-digit unique ID from allocator pool
    evidence:
    - allocator_state_before
    - allocator_state_after
    - allocated_id
  anchor_file_id:
    depends_on:
    - relative_path
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_REGISTRY('anchor_file_for', relative_path)
    rationale: Anchor file reference from path analysis
  filename:
    depends_on:
    - relative_path
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: BASENAME(relative_path)
    rationale: Basename extracted from path
  generator_id:
    depends_on:
    - generated_by_file_id
    error_policy: set_null
    type: string
    trigger: recompute_on_build
    null_behavior: allow
    formula: IF(NOT(IS_NULL(generated_by_file_id)), LOOKUP_REGISTRY('generator_by_file',
      generated_by_file_id), NULL)
    rationale: Generator from source file lookup
  template_ref_entity_id:
    depends_on:
    - relative_path
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_REGISTRY('template_for', relative_path)
    rationale: Template reference entity
  absolute_path:
    depends_on: []
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: NORMALIZE_PATH(INPUT.observed_absolute_path)
    rationale: Normalized from scan input
    evidence:
    - raw_input_path
    - normalized_path
  process_id:
    depends_on:
    - relative_path
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('process_by_path', relative_path)
    rationale: Associated process
  required_suite_key:
    depends_on:
    - artifact_kind
    - governance_domain
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('required_test_suites', artifact_kind, governance_domain)
    rationale: Required test suite key
  evidence_type:
    depends_on:
    - evidence
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(NOT(IS_NULL(evidence)), LOOKUP_COLUMN(evidence, 'type'), NULL)
    rationale: Evidence classification
  entrypoint_flag:
    depends_on:
    - filename
    - relative_path
    error_policy: set_false
    type: boolean
    trigger: recompute_on_scan
    null_behavior: set_false
    formula: "OR(\n  EQUALS(filename, '__main__.py'),\n  EQUALS(filename, 'main.py'),\n\
      \  EQUALS(filename, 'index.js'),\n  EQUALS(filename, 'index.ts'),\n  MATCH(relative_path,\
      \ '^(bin|scripts)/[^/]+$')\n)\n"
    rationale: True if file is an entrypoint
  mtime_utc:
    depends_on:
    - absolute_path
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: FORMAT_ISO8601(FILE_MTIME(absolute_path))
    rationale: Filesystem modification time
  transient_id:
    depends_on:
    - transient_type
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(NOT(IS_NULL(transient_type)), GENERATE_ID('transient'), NULL)
    rationale: Transient operation ID
  evidence_locator:
    depends_on:
    - file_id
    - evidence
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(NOT(IS_NULL(evidence)), LOOKUP_COLUMN(evidence, 'locator'), NULL)
    rationale: Evidence location reference
  record_id:
    depends_on:
    - file_id
    - entity_id
    - edge_id
    - record_kind
    error_policy: fail
    type: string
    trigger: on_create_only
    null_behavior: fail
    formula: COALESCE(file_id, entity_id, edge_id, GENERATE_ID('record'))
    rationale: Universal record identifier
  scan_id:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: INPUT.current_scan_id
    rationale: Current scan identifier
  enforced_by_file_ids:
    depends_on:
    - file_id
    error_policy: set_empty_array
    type: array
    trigger: recompute_on_scan
    null_behavior: set_empty_array
    formula: LOOKUP_REGISTRY('enforcers_of', file_id)
    rationale: Files that enforce constraints on this
  short_description:
    depends_on: null
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: COALESCE(INPUT.short_description, NULL)
    rationale: Inferable default with user override
  edge_id:
    depends_on: []
    error_policy: fail
    type: string
    trigger: on_create_only
    null_behavior: allow
    formula: IF(EQUALS(record_kind, 'relationship'), GENERATE_ID('edge'), NULL)
    rationale: Generated for relationship records
  depends_on_file_ids:
    depends_on:
    - file_id
    - absolute_path
    error_policy: set_empty_array
    type: array
    trigger: recompute_on_scan
    null_behavior: set_empty_array
    formula: LOOKUP_REGISTRY('dependencies_of', file_id)
    rationale: File dependencies from import analysis
  sort_rule_id:
    depends_on:
    - artifact_kind
    - extension
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('sort_rules', artifact_kind, extension)
    rationale: Sorting rule assignment
  build_report_entity_id:
    depends_on:
    - file_id
    error_policy: set_null
    type: string
    trigger: recompute_on_build
    null_behavior: allow
    formula: LOOKUP_REGISTRY('build_report_for', file_id)
    rationale: Associated build report entity
  report_outputs:
    depends_on:
    - file_id
    error_policy: set_empty_array
    type: array
    trigger: recompute_on_build
    null_behavior: set_empty_array
    formula: LOOKUP_REGISTRY('reports_from', file_id)
    rationale: Report output references
  bundle_role_inferred:
    formula: geu_role
    trigger: recompute_on_scan
    type: string
    rationale: Tool-computed inference (never overwritten)
    error_policy: set_null
    null_behavior: allow
    depends_on:
    - geu_role
  directionality:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: on_create_only
    null_behavior: allow
    formula: INPUT.directionality
    rationale: Edge direction specification
  evidence_outputs:
    depends_on:
    - file_id
    - evidence
    error_policy: set_empty_array
    type: array
    trigger: recompute_on_scan
    null_behavior: set_empty_array
    formula: IF(NOT(IS_NULL(evidence)), LOOKUP_COLUMN(evidence, 'outputs'), [])
    rationale: Evidence output references
  source_file_id:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: on_create_only
    null_behavior: allow
    formula: INPUT.source_file_id
    rationale: Source file reference
  schema_version:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: INPUT.schema_version
    rationale: Schema version for this record
  governance_domain:
    depends_on:
    - relative_path
    - artifact_kind
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: INFER_GOVERNANCE_DOMAIN(relative_path, artifact_kind)
    rationale: Inferred from path and artifact type
  sha256:
    depends_on:
    - absolute_path
    - is_directory
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(is_directory, NULL, SHA256_BYTES(READ_BYTES(absolute_path)))
    rationale: Content hash, null for directories
    evidence:
    - file_size_at_hash
    - hash_algorithm
    - hash_value
  one_line_purpose:
    depends_on: null
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: COALESCE(INPUT.one_line_purpose, NULL)
    rationale: Inferable default with user override
  bundle_version:
    depends_on: null
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: COALESCE(INPUT.bundle_version, '1.0.0')
    rationale: Inferable default with user override
  bundle_role_source:
    formula: IF(NOT(IS_NULL(INPUT.bundle_role)), 'manual', 'inferred')
    trigger: recompute_on_scan
    type: string
    rationale: Provenance tracking
    error_policy: set_null
    null_behavior: allow
    depends_on:
    - bundle_role_inferred
  first_seen_utc:
    depends_on: []
    error_policy: fail
    type: string
    trigger: on_create_only
    null_behavior: fail
    formula: NOW_UTC()
    rationale: Discovery timestamp, immutable
  edge_type:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: on_create_only
    null_behavior: allow
    formula: INPUT.edge_type
    rationale: Type of relationship edge
  evidence_method:
    depends_on:
    - evidence
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(NOT(IS_NULL(evidence)), LOOKUP_COLUMN(evidence, 'method'), NULL)
    rationale: How evidence was collected
  process_step_id:
    depends_on:
    - relative_path
    - process_id
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('step_by_path', relative_path, process_id)
    rationale: Associated process step
  primary_geu_id:
    depends_on:
    - module_id
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_REGISTRY('geu_by_module', module_id)
    rationale: Primary GEU from module mapping
  canonical_path:
    depends_on:
    - relative_path
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: LOWER(NORMALIZE_PATH(relative_path))
    rationale: Lowercase normalized for cross-platform matching
  is_directory:
    depends_on:
    - absolute_path
    error_policy: fail
    type: boolean
    trigger: recompute_on_scan
    null_behavior: fail
    formula: IS_DIRECTORY(absolute_path)
    rationale: Filesystem stat check
  target_schema_id:
    depends_on:
    - extension
    - relative_path
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('schemas_by_extension', extension)
    rationale: Target schema for validation
  bundle_key_inferred:
    formula: INFER_BUNDLE_KEY(relative_path)
    trigger: recompute_on_scan
    type: string
    rationale: Tool-computed inference (never overwritten)
    error_policy: set_null
    null_behavior: allow
    depends_on:
    - relative_path
  tool_version:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: INPUT.tool_version
    rationale: Version of processing tool
  canonicality_source:
    formula: IF(NOT(IS_NULL(INPUT.canonicality)), 'manual', 'inferred')
    trigger: recompute_on_scan
    type: string
    rationale: Provenance tracking
    error_policy: set_null
    null_behavior: allow
    depends_on:
    - canonicality_inferred
  generator_version:
    depends_on:
    - generator_id
    error_policy: set_null
    type: string
    trigger: recompute_on_build
    null_behavior: allow
    formula: IF(NOT(IS_NULL(generator_id)), LOOKUP_REGISTRY('generator_version', generator_id),
      NULL)
    rationale: Generator version
  evidence_only:
    depends_on:
    - relative_path
    error_policy: set_false
    type: boolean
    trigger: recompute_on_scan
    null_behavior: set_false
    formula: STARTS_WITH(relative_path, '.state/evidence/')
    rationale: True if exists only as evidence artifact
  generator_name:
    depends_on:
    - generator_id
    error_policy: set_null
    type: string
    trigger: recompute_on_build
    null_behavior: allow
    formula: IF(NOT(IS_NULL(generator_id)), LOOKUP_REGISTRY('generator_name', generator_id),
      NULL)
    rationale: Generator tool name
  target_file_id:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: on_create_only
    null_behavior: allow
    formula: INPUT.target_file_id
    rationale: Target file reference
  enforces_rule_ids:
    depends_on:
    - file_id
    - artifact_kind
    error_policy: set_empty_array
    type: array
    trigger: recompute_on_scan
    null_behavior: set_empty_array
    formula: LOOKUP_REGISTRY('rules_enforced_by', file_id)
    rationale: Rules this file enforces
  updated_by:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: INPUT.updater_id
    rationale: Last updater identifier
  record_kind:
    depends_on: []
    error_policy: set_null
    type: string
    trigger: on_create_only
    null_behavior: allow
    formula: INPUT.record_kind
    rationale: Classification of record type
  confidence:
    depends_on:
    - artifact_kind
    - layer
    - governance_domain
    error_policy: set_null
    type: number
    trigger: recompute_on_scan
    null_behavior: set_null
    formula: "IF(\n  AND(NOT(IS_NULL(artifact_kind)), NOT(IS_NULL(layer))),\n  1.0,\n\
      \  IF(NOT(IS_NULL(artifact_kind)), 0.7, 0.3)\n)\n"
    rationale: Confidence score for inferred values
  entity_kind_inferred:
    formula: INFER_ENTITY_KIND(record_kind, artifact_kind)
    trigger: recompute_on_scan
    type: string
    rationale: Tool-computed inference (never overwritten)
    error_policy: set_null
    null_behavior: allow
    depends_on:
    - record_kind
    - artifact_kind
  output_kind:
    depends_on:
    - output_path
    - extension
    error_policy: set_null
    type: string
    trigger: recompute_on_build
    null_behavior: allow
    formula: IF(NOT(IS_NULL(output_path)), INFER_ARTIFACT_KIND(EXTENSION(output_path),
      output_path), NULL)
    rationale: Type of generated output
  allocated_at:
    depends_on: []
    error_policy: fail
    type: string
    trigger: on_create_only
    null_behavior: fail
    formula: NOW_UTC()
    rationale: Timestamp when ID was allocated
  layer_inferred:
    formula: INFER_LAYER(relative_path)
    trigger: recompute_on_scan
    type: string
    rationale: Tool-computed inference (never overwritten)
    error_policy: set_null
    null_behavior: allow
    depends_on:
    - relative_path
  status_source:
    formula: IF(NOT(IS_NULL(INPUT.status)), 'manual', 'inferred')
    trigger: recompute_on_scan
    type: string
    rationale: Provenance tracking
    error_policy: set_null
    null_behavior: allow
    depends_on:
    - status_inferred
  geu_role_definitions:
    depends_on:
    - geu_role
    error_policy: set_null
    type: object
    trigger: recompute_on_build
    null_behavior: allow
    formula: IF(NOT(IS_NULL(geu_role)), LOOKUP_CONFIG('geu_role_definitions', geu_role),
      NULL)
    rationale: GEU role definition lookup
  generated_by_file_id:
    depends_on:
    - relative_path
    error_policy: set_null
    type: string
    trigger: recompute_on_build
    null_behavior: allow
    formula: LOOKUP_REGISTRY('generator_source_for', relative_path)
    rationale: Source file that generated this artifact
  edges:
    depends_on:
    - file_id
    - entity_id
    error_policy: set_empty_array
    type: array
    trigger: recompute_on_scan
    null_behavior: set_empty_array
    formula: LOOKUP_REGISTRY('edges_for', COALESCE(file_id, entity_id))
    rationale: All edges connected to this record
  relative_path:
    depends_on:
    - absolute_path
    - repo_root_id
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: RELATIVE_TO(absolute_path, LOOKUP_CONFIG('repo_roots', repo_root_id))
    rationale: Computed relative to repo root
  coverage_status:
    depends_on:
    - test_file_ids
    - has_tests
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: set_null
    formula: "IF(\n  has_tests,\n  IF(COUNT(test_file_ids) > 2, 'well_covered', 'covered'),\n\
      \  'uncovered'\n)\n"
    rationale: Test coverage status
  geu_ids:
    depends_on:
    - primary_geu_id
    - owner_geu_id
    error_policy: set_empty_array
    type: array
    trigger: recompute_on_scan
    null_behavior: set_empty_array
    formula: UNIQUE(FILTER([primary_geu_id, owner_geu_id], NOT(IS_NULL(item))))
    rationale: All associated GEUs
  directory_path:
    depends_on:
    - relative_path
    error_policy: fail
    type: string
    trigger: recompute_on_scan
    null_behavior: fail
    formula: DIRNAME(relative_path)
    rationale: Parent directory path
  process_step_role:
    depends_on:
    - process_step_id
    - artifact_kind
    error_policy: set_null
    type: string
    trigger: recompute_on_scan
    null_behavior: allow
    formula: LOOKUP_CONFIG('step_roles', process_step_id, artifact_kind)
    rationale: Role in process step
  size_bytes:
    depends_on:
    - absolute_path
    - is_directory
    error_policy: fail
    type: integer
    trigger: recompute_on_scan
    null_behavior: allow
    formula: IF(is_directory, NULL, FILE_SIZE(absolute_path))
    rationale: Filesystem primitive, null for directories
  runner_based:
    depends_on:
    - filename
    - relative_path
    error_policy: set_false
    type: boolean
    trigger: recompute_on_scan
    null_behavior: set_false
    formula: "OR(\n  STARTS_WITH(filename, 'test_'),\n  ENDS_WITH(filename, '_test.py'),\n\
