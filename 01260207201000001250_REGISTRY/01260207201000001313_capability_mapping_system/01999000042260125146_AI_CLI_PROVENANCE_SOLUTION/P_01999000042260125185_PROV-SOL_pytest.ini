[pytest]
# Pytest configuration for AI CLI Provenance Solution
# Created: 2026-01-04

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short

# Coverage options (uncomment after installing pytest-cov)
# --cov=.
# --cov-report=html
# --cov-report=term-missing
# --cov-branch
# --cov-fail-under=80

# Coverage exclusions
[coverage:run]
omit =
    */tests/*
    */conftest.py
    */.venv/*
    */venv/*
    setup.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
