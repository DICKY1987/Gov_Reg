enums:
  null_policy:
  - allow_null
  - forbid_null
  - conditional
  update_policy:
  - immutable
  - recompute_on_scan
  - recompute_on_build
  - manual_patch_only
  - manual_or_automated
  - normalize_on_ingest
  writable_by:
  - tool_only
  - user_only
  - both
  - never
  merge_strategy:
  - replace
  - set_union
  - append_unique
  - object_merge
policy_id: UNIFIED_SSOT_REGISTRY_WRITE_POLICY
validation:
  consistency:
    filesystem_primitives:
    - size_bytes
    - mtime_utc
    - sha256
    rule: Columns with recompute_on_* must have derivation entry OR be filesystem
      primitive
    on_violation: fail
  completeness:
    rule: Every column in registry schema must have exactly one entry
    on_violation: fail
  alignment:
    rule: 'Derived columns must be writable_by: tool_only'
    exceptions:
    - entity_kind
    - layer
    - bundle_role
    - bundle_key
    - artifact_kind
    - canonicality
    - status
    on_violation: warn
version: 1.0.0
status: authoritative
applies_to_registry: UNIFIED_SSOT_REGISTRY.json
generated_utc: 2026-01-29 00:00:00+00:00
promotion_blockers:
  - blocker_id: FILE_ID_MISMATCH
    affects: all py_* columns
    description: >
      Pipeline sets file_id = content_sha256 (64-char hex).
      Registry expects 20-digit numeric ID from ALLOCATE_FILE_ID().
      A mapping/lookup layer is required before any py_* values
      can be promoted to registry records.
    status: open
    cross_ref: PY_COLUMN_PIPELINE_MAPPING.md § Critical Integration Gap
