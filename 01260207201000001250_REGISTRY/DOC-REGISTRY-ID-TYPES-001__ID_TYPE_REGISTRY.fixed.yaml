    Deterministic identifier for Python code components (functions, classes, methods).
    Hash derived from SHA256(doc_id + qualname + signature + kind).
    First 12 hex characters ensure uniqueness while maintaining readability.
  derivation:
    algorithm: sha256
    inputs:
      - doc_id
      - component.qualname
      - component.signature_normalized
      - component.kind
    normalization:
      signature_normalized:
        remove_whitespace: true
        remove_comments: true
        normalize_literals: true
        normalize_identifiers: false
  validators:
    - validate_component_id_format
    - validate_component_id_determinism
  automation:
    scanner: false
    assigner: false
    pre_commit: false
  work_id: WORK-MAPP-PY-001
  first_seen: '2026-01-07T18:20:00Z'
  notes: |
    Component IDs enable fine-grained similarity analysis and duplicate detection
    at the function/class level. Unlike DOC_IDs (which identify files), COMP-IDs
    identify individual code components within files for granular comparison.
