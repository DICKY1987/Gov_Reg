## SEC-014: DECISION LEDGER

```yaml
decision_ledger:
  description: |
    Append-only log of all decisions made during planning and execution.
    Every decision must have: context, options, selected, rationale.
  
  storage:
    format: "jsonl"
    path: ".state/evidence/decisions/decision_log.jsonl"
    rotation_policy: "append_only"
  
  decisions:
    - decision_id: "DEC-{{PROJECT}}-001"  # [2009]
      category: "{{classification|architecture|tooling|process|technical}}"
      timestamp: "{{ISO8601_TIMESTAMP}}"
      context:
        # Structured data about the decision context
        key: "value"
      options: ["{{OPTION1}}", "{{OPTION2}}", "{{OPTION3}}"]
      selected_option: "{{SELECTED}}"
      rationale: "{{WHY_THIS_CHOICE}}"
      owner: "{{DRI}}"
      impact: "{{HIGH|MEDIUM|LOW}}"
      reversible: "{{YES|NO}}"
      
      validation:
        command: "{{COMMAND_TO_VERIFY_DECISION}}"
        expect_exit_code: 0
    
    # Add ALL decisions made during planning
  
  decision_categories:
    - "classification"      # Project complexity level
    - "architecture"        # System design choices
    - "tooling"            # Tool selections
    - "process"            # Workflow decisions
    - "technical"          # Implementation choices
    - "scope"              # In/out of scope decisions
    - "quality"            # Quality gate selections
  
  ledger_validation:
    command: "python scripts/validate_decision_ledger.py .state/evidence/decisions/decision_log.jsonl"
    expect_exit_code: 0
    checks:
      - "All decisions have rationale"
      - "All decisions have timestamp"
      - "All decisions have owner"
      - "No duplicate decision_ids"
```

