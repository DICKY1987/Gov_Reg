## SEC-016: TESTING STRATEGY

```yaml
testing_strategy:
  test_first_development:
    enabled: true
    description: "Write tests alongside code (TDD)"
    requirement: "Tests must pass 100% (or explicit exception with mitigation)"
  
  test_layers:
    unit:
      description: "Test individual functions/classes in isolation"
      coverage_target: "{{70|80|90|95}}%"  # Based on classification
      location: "tests/unit/**"
      run_command: "pytest tests/unit -v --tb=short --cov=src --cov-report=term"
      timeout_seconds: 300
      
      quality_gates:
        - "0 failures"
        - "Coverage >= target"
        - "No skipped tests without justification"
    
    integration:
      description: "Test component interactions"
      coverage_target: "{{70|80|90}}%"
      location: "tests/integration/**"
      run_command: "pytest tests/integration -v --tb=short"
      timeout_seconds: 600
      
      quality_gates:
        - "0 failures"
        - "All critical paths tested"
        - "External dependencies mocked appropriately"
    
    e2e:
      description: "Test complete workflows end-to-end"
      coverage_target: "{{50|70|80}}%"
      location: "tests/e2e/**"
      run_command: "pytest tests/e2e -v --tb=short"
      timeout_seconds: 1800
      
      quality_gates:
        - "0 failures"
        - "All user stories covered"
        - "Performance targets met"
    
    determinism:
      description: "Verify outputs are stable across runs"
      location: "tests/determinism/**"
      run_command: "python scripts/test_determinism.py --runs 3 --compare-outputs"
      timeout_seconds: 600
      
      quality_gates:
        - "Determinism score >= 0.95"
        - "All idempotency tests pass"
  
  test_fixtures:
    valid_inputs:
      location: "tests/fixtures/valid/**"
      description: "Sample valid input data"
      count: "{{N}}"
    
    invalid_inputs:
      location: "tests/fixtures/invalid/**"
      description: "Sample invalid input data with expected errors"
      count: "{{N}}"
    
    expected_outputs:
      location: "tests/fixtures/expected/**"
      description: "Expected outputs for each input"
      format: "{{json|yaml|csv|text}}"
    
    mock_objects:
      location: "tests/mocks/**"
      description: "Mock external dependencies"
      dependencies_mocked: ["{{DEPENDENCY1}}", "{{DEPENDENCY2}}"]
  
  test_implementation_examples:
    unit_test:
      file: "tests/unit/test_example.py"
      content: |
        import pytest
        from src.example import function_to_test
        
        def test_function_basic():
            result = function_to_test(input_value)
            assert result == expected_value
        
        def test_function_edge_case():
            with pytest.raises(ValueError):
                function_to_test(invalid_input)
    
    integration_test:
      file: "tests/integration/test_example_integration.py"
      content: |
        import pytest
        from src.component_a import ComponentA
        from src.component_b import ComponentB
        
        @pytest.fixture
        def setup_components():
            a = ComponentA()
            b = ComponentB()
            return a, b
        
        def test_component_interaction(setup_components):
            a, b = setup_components
            result = a.call(b.process())
            assert result.status == "success"
    
    determinism_test:
      file: "tests/determinism/test_determinism.py"
      content: |
        import pytest
        from src.main import main_function
        
        def test_determinism():
            results = []
            for _ in range(3):
                result = main_function(same_input)
                results.append(result)
            
            assert results[0] == results[1] == results[2]
  
  quality_gates_summary:
    run_all_tests_command: "pytest tests/ -v --tb=short --cov=src --cov-report=term --cov-report=html:.runs/coverage_html"
    expect_exit_code: 0
    
    gates:
      - "100% of tests pass"
      - "Coverage >= classification-based target"
      - "Determinism score >= 0.95"
      - "0 high/critical security issues in test code"
```

