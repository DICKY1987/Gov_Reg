        why_it_matters: "{{IMPACT_ON_PLAN}}"
        options: ["{{OPTION1}}", "{{OPTION2}}"]
        resolution_step: "{{HOW_TO_ANSWER}}"
        blocking: "{{YES|NO}}"
        owner: "{{DRI}}"
        status: "{{open|answered|deferred}}"
      
      # Add all open questions (or explicitly state NONE)
  
  phase_specific_deltas:
